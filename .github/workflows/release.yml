name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Install vsce + ovsx
        run: npm install -g @vscode/vsce ovsx

      - name: Build
        run: node esbuild.mjs --production

      - name: Package .vsix
        run: vsce package --no-dependencies --out consilium-vscode.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish --no-dependencies --packagePath consilium-vscode.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX (Cursor / VSCodium)
        if: ${{ env.OVSX_PAT != '' }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: ovsx publish consilium-vscode.vsix --pat "$OVSX_PAT"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            consilium-vscode.vsix
